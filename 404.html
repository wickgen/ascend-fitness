<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | ASCEND Fitness Studios</title>
    <meta name="description" content="The page you're looking for doesn't exist. Return to ASCEND Fitness Studios homepage." />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/webp" href="/assets/favicon.webp?v=2" />
    <link rel="apple-touch-icon" href="/assets/favicon.webp?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: { black: "#0a0a0a", dark: "#121212", gray: "#2a2a2a", silver: "#a0a0a0", white: "#ffffff" },
            },
            fontFamily: { sans: ["Montserrat", "sans-serif"], header: ["Oswald", "sans-serif"] },
          },
        },
      };
    </script>
    <style>
      @keyframes gradient-shift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
      @keyframes pulse-glow{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.6;transform:scale(1.05)}}
      @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
      @keyframes rotate-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
      @keyframes fade-in-up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
      .gradient-text{background:linear-gradient(135deg,#fff,#a0a0a0,#fff,#666);background-size:300% 300%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:gradient-shift 6s ease infinite}
      .pulse-glow{animation:pulse-glow 4s ease-in-out infinite}
      .glass{background:rgba(255,255,255,.03);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08)}
      .glass-strong{background:rgba(255,255,255,.05);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.1)}
      .btn-premium{position:relative;overflow:hidden;transition:all .4s ease}
      .btn-premium::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transform:translateX(-100%)}
      .btn-premium:hover::before{animation:shimmer .8s ease forwards}
      .btn-premium:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(160,160,160,.3)}
      .floating{animation:float 6s ease-in-out infinite}
      .rotating-ring{animation:rotate-slow 20s linear infinite}
      .fade-in-up{animation:fade-in-up 1s ease-out forwards;opacity:0}
      .delay-1{animation-delay:.1s}
      .delay-2{animation-delay:.2s}
      .delay-3{animation-delay:.3s}
      .delay-4{animation-delay:.4s}
      .delay-5{animation-delay:.5s}
      @keyframes pageLoad{from{opacity:0}to{opacity:1}}
      body{animation:pageLoad .4s ease-out}
    </style>
  </head>
  <body class="bg-brand-black text-white font-sans overflow-x-hidden">

    <!-- Full Screen 404 Section -->
    <section class="relative min-h-screen flex items-center justify-center overflow-hidden">
      <!-- Background -->
      <div class="absolute inset-0 bg-gradient-to-br from-brand-black via-brand-dark to-brand-black"></div>

      <!-- Decorative orbs -->
      <div class="absolute top-20 right-10 w-72 h-72 bg-brand-silver/5 rounded-full blur-[100px] pulse-glow"></div>
      <div class="absolute bottom-40 left-10 w-96 h-96 bg-white/5 rounded-full blur-[120px] pulse-glow" style="animation-delay:2s"></div>

      <!-- Rotating ring -->
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] md:w-[700px] md:h-[700px] rotating-ring opacity-[0.04]">
        <svg viewBox="0 0 100 100" fill="none" class="w-full h-full">
          <circle cx="50" cy="50" r="48" stroke="white" stroke-width="0.3" stroke-dasharray="4 6" />
        </svg>
      </div>

      <!-- Content -->
      <div class="relative z-10 text-center px-4 sm:px-6 max-w-3xl mx-auto">
        <!-- Badge -->
        <div class="fade-in-up delay-1">
          <span class="inline-block py-2 px-6 rounded-full glass text-brand-silver text-[10px] sm:text-xs font-bold tracking-[0.3em] mb-8 uppercase">Page Not Found</span>
        </div>

        <!-- 404 Icon -->
        <div class="fade-in-up delay-2 mb-8">
          <div class="w-20 h-20 mx-auto glass-strong rounded-2xl flex items-center justify-center floating">
            <svg class="w-10 h-10 text-brand-silver" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
          </div>
        </div>

        <!-- Main Title -->
        <h1 class="text-7xl sm:text-8xl md:text-9xl font-header font-bold mb-4 tracking-tighter gradient-text fade-in-up delay-3">404</h1>
        <p class="text-gray-400 max-w-md mx-auto mb-6 text-sm sm:text-base md:text-lg leading-relaxed fade-in-up delay-4">
          This page has left the building. Let's get you back on track.
        </p>
        <div class="w-20 h-[2px] mx-auto mb-10 bg-gradient-to-r from-transparent via-brand-silver to-transparent fade-in-up delay-4"></div>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center fade-in-up delay-5">
          <a href="/" class="btn-premium inline-flex items-center justify-center gap-3 px-10 py-4 bg-gradient-to-r from-brand-white to-gray-400 text-brand-black font-header font-bold tracking-[0.15em] rounded-lg uppercase text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
            </svg>
            Back to Home
          </a>
          <a href="/contact.html" class="inline-flex items-center justify-center gap-3 px-10 py-4 glass rounded-lg font-header font-bold tracking-[0.15em] uppercase text-sm text-white hover:border-brand-silver/40 transition-all duration-500 hover:-translate-y-0.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
            Contact Us
          </a>
        </div>
      </div>
    </section>

  </body>
</html>
